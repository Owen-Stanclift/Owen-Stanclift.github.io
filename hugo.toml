baseURL = 'https://owen-stanclift.github.io'
languageCode = 'en-us'
title = 'Owen Stanclift'
theme = 'mana' 

[caches]
  [caches.images]
    dir = ':cacheDir/images'
 
[params]
  description = "Hello, My name is Owen Stanclift. A Game Programmer who loves to bring creatives ideas to life. If you wish to learn more click on the About tab! If you wish to view my projects, click on Projects!"
  favicon = "/favicon/favicon.ico"
  footerText = "Built with Hugo and Mana theme"  # Optional
  
  # Hero section title (optional - defaults to site.Title)
  heroTitleLine1 = "Owen"  # First line of hero title
  heroTitleLine2 = "Stanclift"    # Second line of hero title (optional)

 # Custom message for the 404 error page (supports HTML)
  # If not set, defaults to: "Sorry, the page you are looking for could not be found."
  custom404Message = "Sorry, the page you are looking for could not be found. I guess I don't have a guide for <em>everything</em>"

[params.avatar]
  url = "/images/avatar.jpg"

[params.social]
  email = "commandrburn@gmail.com"
  github = "https://github.com/Owen-Stanclift"
  linkedin = "https://www.linkedin.com/in/owen-stanclift/"

[[menus.main]]
  name = 'Home'
  url = '/'
  weight = 10

[[menus.main]]
name = 'About'
url = '/about/'
weight = 20

[[menus.main]]
  name = 'Projects'
  url = '/projects/'
  weight = 30

[[menus.main]]
  name = 'Resume'
  url = '/resume/'
  weight = 40



[pagination]
  pageSize = 10  # Number of posts per page (default: 10)

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  [markup.goldmark]
    [markup.goldmark.parser]
      # Enable block-level attributes for blockquotes
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-macchiato"  # Default style
[markup.goldmark.renderer]
unsafe = true


  [params.codeHighlight]
    darkTheme = "catppuccin-macchiato"   # Theme for dark mode
    lightTheme = "catppuccin-frappe"     # Theme for light mode

[outputs]
  home = ["HTML", "JSON"]